<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M3Y17K5NFS"></script>

      function gtag(){dataLayer.push(arguments);}

    <!-- Production Meta Tags -->
    <title>WeBox - 100% Güvenli ve Tamamen Ücretsiz Dosya &amp; Medya Araç Kutusu</title>
    <meta name="description" content="WeBox, PDF birleştirme, görsel düzenleme, video ses çıkartma, belge çeviri ve filigran ekleme araçlarını sunucu yüklemeden tamamen cihazınızda çalıştırır." />
    <meta name="keywords" content="PDF birleştirme, resim dönüştürücü, ses çıkarma, belge çeviri, filigran ekleme, pdf araçları, ücretsiz araçlar, webox" />
    <meta name="author" content="WeBox" />
    <meta name="robots" content="index, follow" />
    
    <!-- PWA / Mobile Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WeBox" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/logo-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/logo-192.png" />
    
    <!-- Favicon link -->
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo-512.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo-192.png" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#171717" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webox-app.vercel.app/" />
    <meta property="og:title" content="WeBox - 100% Güvenli Belge ve Medya Araç Kutusu" />
    <meta property="og:description" content="Dosyalarınız hiçbir sunucuya yüklenmez. Tüm işlemler doğrudan tarayıcınızda ve tamamen ücretsiz gerçekleşir." />
    <meta property="og:image" content="/logo-512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="WeBox - 100% Güvenli Araçlar" />
    <meta property="twitter:description" content="Dosyalarınız tarayıcınızdan asla ayrılmaz. Hızlı, güvenli ve ücretsiz." />
    
    <!-- Structured Data JSON-LD for Google Rich Snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "WeBox",
        "url": "https://webox-app.vercel.app",
        "description": "Premium client-side serverless document, PDF, and media utility toolbox running safely inside browser sandbox.",
        "applicationCategory": "Utility",
        "operatingSystem": "All",
        "browserRequirements": "Requires HTML5, WebAssembly, SharedArrayBuffer",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <!-- PWA Service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('WeBox ServiceWorker registered successfully with scope: ', reg.scope);
            })
            .catch((err) => {
              console.log('WeBox ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
